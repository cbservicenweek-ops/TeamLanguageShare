<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Language Share</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="font-sans antialiased text-gray-900">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-indigo-600 tracking-tight">🌍 Team Language Share</h1>
            <p class="text-gray-600 mt-2">Learn phrases from your teammates around the world!</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-xl font-bold mb-4 text-gray-800">Share a Phrase</h2>
                <form id="phraseForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Your Name</label>
                        <input type="text" id="userName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Alex">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Language</label>
                        <input type="text" id="language" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Spanish, Tagalog">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Original Phrase</label>
                        <input type="text" id="nativePhrase" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., ¡Hola, buenos días!">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">How to Pronounce</label>
                        <input type="text" id="pronunciation" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Oh-lah, bweh-nos dee-ahs">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">English Translation</label>
                        <input type="text" id="englishTranslation" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Hello, good morning!">
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white font-medium py-2 rounded-lg hover:bg-indigo-700 transition duration-200">Share with Team</button>
                </form>
            </div>

            <div class="md:col-span-2">
                <h2 class="text-xl font-bold mb-4 text-gray-800 flex items-center justify-between">
                    <span>Our Team's Phrases</span>
                    <span id="phraseCount" class="text-sm font-normal bg-indigo-100 text-indigo-800 px-2.5 py-0.5 rounded-full">0 phrases</span>
                </h2>
                <div id="phrasesList" class="space-y-4">
                    <div class="text-center py-8 text-gray-500">Loading phrases...</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your exact Firebase configuration integrated successfully
        const firebaseConfig = {
            apiKey: "AIzaSyCjHpHyxq6osgdUQNbHS0_RtGKj55ON0IE",
            authDomain: "cb-team-language-share.firebaseapp.com",
            projectId: "cb-team-language-share",
            storageBucket: "cb-team-language-share.firebasestorage.app",
            messagingSenderId: "973592081998",
            appId: "1:973592081998:web:72d893fe83f423fb11f51f"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const phrasesCollection = collection(db, "phrases");

        // UI Elements
        const phraseForm = document.getElementById('phraseForm');
        const phrasesList = document.getElementById('phrasesList');
        const phraseCount = document.getElementById('phraseCount');

        // Listen for Real-time Updates from Firestore
        const q = query(phrasesCollection, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            phrasesList.innerHTML = "";
            phraseCount.textContent = `${snapshot.size} phrase${snapshot.size === 1 ? '' : 's'}`;

            if (snapshot.empty) {
                phrasesList.innerHTML = `<div class="bg-white p-6 rounded-2xl text-center text-gray-500 border border-gray-100">No phrases shared yet. Be the first!</div>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-xs border border-gray-100 flex flex-col justify-between transition hover:shadow-md";
                card.innerHTML = `
                    <div class="mb-3">
                        <span class="inline-block bg-indigo-50 text-indigo-700 text-xs font-semibold px-2 py-1 rounded mb-2">${data.language}</span>
                        <p class="text-2xl font-bold text-gray-800 tracking-wide">${data.nativePhrase}</p>
                        <p class="text-sm text-gray-500 italic mt-0.5">🗣️ Pronounced: "${data.pronunciation || 'N/A'}"</p>
                        <p class="text-md text-gray-700 font-medium mt-2">✨ Meaning: "${data.englishTranslation}"</p>
                    </div>
                    <div class="border-t border-gray-100 pt-2 flex justify-between items-center text-xs text-gray-400">
                        <span>Shared by <strong class="text-gray-600">${data.userName}</strong></span>
                    </div>
                `;
                phrasesList.appendChild(card);
            });
        });

        // Handle Form Submission
        phraseForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userName = document.getElementById('userName').value;
            const language = document.getElementById('language').value;
            const nativePhrase = document.getElementById('nativePhrase').value;
            const pronunciation = document.getElementById('pronunciation').value;
            const englishTranslation = document.getElementById('englishTranslation').value;

            try {
                await addDoc(phrasesCollection, {
                    userName,
                    language,
                    nativePhrase,
                    pronunciation,
                    englishTranslation,
                    createdAt: new Date()
                });
                
                // Clear descriptive inputs except username for sequential input speed
                document.getElementById('language').value = '';
                document.getElementById('nativePhrase').value = '';
                document.getElementById('pronunciation').value = '';
                document.getElementById('englishTranslation').value = '';
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Failed to save phrase. Check your Firestore date rules configuration.");
            }
        });
    </script>
</body>
</html>
